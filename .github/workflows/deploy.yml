name: Marsh CICD Pipeline

on:
  push:
    branches:
      - Stagingnet8
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    name: Build .NET 8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensures full repo is fetched

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Clean and Restore Dependencies
        run: |
          dotnet nuget locals all --clear
          dotnet clean
          dotnet restore

      - name: Build Project
        run: dotnet build -c Release --no-restore

      - name: Publish Project
        run: |
          echo "🔧 Creating publish output directory..."
          mkdir -p ./publish_output
          echo "🚀 Running dotnet publish..."
          dotnet publish DealEngine.WebUI/DealEngine.WebUI.csproj -c Release --no-restore -o ./publish_output
          echo "📂 Checking publish_output directory..."
          ls -la ./publish_output  # Debugging step

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./publish_output

  deploy_stagingmnzconnect:
    name: Deploy to Marsh Staging
    runs-on: ubuntu-latest
    needs: build  # Ensures deployment only runs after a successful build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensures full repo is fetched

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./publish_output

      - name: Setup SSH
        run: |
          echo "🔑 Setting up SSH..."
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.URLINSUREStagingMNZConnect }} >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Replace URLs in CKEditor
        run: |
          echo "🔧 Updating CKEditor URLs..."
          sed -i "s|https://localhost:44323/Image/CKGetAllImages|https://${{ secrets.URLINSUREStagingMNZConnect }}/Image/CKGetAllImages|g" DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js
          sed -i "s|https://localhost:44323/Image/_|https://${{ secrets.URLINSUREStagingMNZConnect }}/Image/_|g" DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js
          sed -i "s|https://localhost:44323/Image/CKUpload|https://${{ secrets.URLINSUREStagingMNZConnect }}/Image/CKUpload|g" DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js
          sed -i "s|https://localhost:44323/Image/|https://${{ secrets.URLINSUREStagingMNZConnect }}/Image/|g" DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js

      - name: Verify Publish Directory Before Deployment
        run: |
          echo "📂 Checking publish_output directory before deployment..."
          if [ -d "./publish_output" ]; then
            echo "✅ Publish directory exists. Proceeding with deployment."
            ls -la ./publish_output
          else
            echo "❌ ERROR: Publish directory not found!"
            exit 1
          fi

      - name: Deploy Files via Rsync
        run: |
          echo "🚀 Deploying files via rsync..."
          rsync -azhe "ssh -o StrictHostKeyChecking=no" ./publish_output/ ubuntu@${{ secrets.URLINSUREStagingMNZConnect }}:/home/ubuntu/projects/dealengine

      - name: Verify Deployment Timestamp
        run: |
          echo "🕒 Checking file timestamps on server..."
          ssh ubuntu@${{ secrets.URLINSUREStagingMNZConnect }} "ls -lt /home/ubuntu/projects/dealengine/ | head -n 10"

      - name: Verify File Content (Version Check)
        run: |
          echo "📄 Checking deployed version file..."
          ssh ubuntu@${{ secrets.URLINSUREStagingMNZConnect }} "cat /home/ubuntu/projects/dealengine/version.txt || echo '⚠️ No version file found'"

      - name: Execute Final Deploy Script
        run: |
          echo "🚀 Running final deployment script on server..."
          ssh ubuntu@${{ secrets.URLINSUREStagingMNZConnect }} './DE-DeployFin.sh'
