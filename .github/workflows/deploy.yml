name: Marsh CICD Pipeline

on:
  push:
    branches:
      - Stagingnet8
      - Stagingnet8Production

  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - rotary

jobs:
  build:
    name: Build .NET 8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Clean and Restore Dependencies
        run: |
          dotnet nuget locals all --clear
          dotnet clean
          dotnet restore

      - name: Build Project
        run: dotnet build -c Release --no-restore

      - name: Publish Project
        run: |
          mkdir -p ./publish_output
          dotnet publish DealEngine.WebUI/DealEngine.WebUI.csproj \
            -c Release \
            -f net8.0 \
            --no-restore \
            -o ./publish_output
          ls -la ./publish_output

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./publish_output

  deploy:
    name: Deploy to Selected Environment
    runs-on: ubuntu-latest
    needs: build

    if: github.event.inputs.environment == 'staging' ||
        github.event.inputs.environment == 'production' ||
        github.event.inputs.environment == 'rotary'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./publish_output

      - name: Setup SSH
        run: |
          echo "🔑 Setting up SSH..."
          mkdir -p ~/.ssh

          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "${{ secrets.SSH_PROD_KEY }}" > ~/.ssh/id_rsa
            HOST=${{ secrets.URLINSUREProduction }}

          elif [ "${{ github.event.inputs.environment }}" == "rotary" ]; then
            echo "${{ secrets.SSH_ROTARY_KEY }}" > ~/.ssh/id_rsa
            HOST=${{ secrets.URLINSURERotary }}

          else
            echo "${{ secrets.SSH_STAGING_KEY }}" > ~/.ssh/id_rsa
            HOST=${{ secrets.URLINSUREStagingMNZConnect }}
          fi

          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Replace URLs in CKEditor
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            HOST=${{ secrets.URLINSUREProduction }}

          elif [ "${{ github.event.inputs.environment }}" == "rotary" ]; then
            HOST=${{ secrets.URLINSURERotary }}

          else
            HOST=${{ secrets.URLINSUREStagingMNZConnect }}
          fi

          sed -i "s|https://localhost:44323/Image/CKGetAllImages|https://$HOST/Image/CKGetAllImages|g" \
            DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js
          sed -i "s|https://localhost:44323/Image/_|https://$HOST/Image/_|g" \
            DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js
          sed -i "s|https://localhost:44323/Image/CKUpload|https://$HOST/Image/CKUpload|g" \
            DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js
          sed -i "s|https://localhost:44323/Image/|https://$HOST/Image/|g" \
            DealEngine.WebUI/wwwroot/ckeditor/ckeditor5-techcertain/build/ckeditor.js

      - name: Verify Publish Directory
        run: |
          if [ ! -d "./publish_output" ]; then
            echo "❌ ERROR: publish_output directory not found!"
            exit 1
          fi

      - name: Execute Pre-Deployment Script
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            ssh ubuntu@${{ secrets.URLINSUREProduction }} './DE-DeployPrep.sh'

          elif [ "${{ github.event.inputs.environment }}" == "rotary" ]; then
            ssh ubuntu@${{ secrets.URLINSURERotary }} './DE-DeployPrep.sh'

          else
            ssh ubuntu@${{ secrets.URLINSUREStagingMNZConnect }} './DE-DeployPrep.sh'
          fi

      - name: Deploy Files via Rsync
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            TARGET=${{ secrets.URLINSUREProduction }}

          elif [ "${{ github.event.inputs.environment }}" == "rotary" ]; then
            TARGET=${{ secrets.URLINSURERotary }}

          else
            TARGET=${{ secrets.URLINSUREStagingMNZConnect }}
          fi

          rsync -azhe "ssh -o StrictHostKeyChecking=no" \
            ./publish_output/ \
            ubuntu@$TARGET:/home/ubuntu/projects/dealengine/publish/

      - name: Verify Deployment
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            ssh ubuntu@${{ secrets.URLINSUREProduction }} "ls -lah /home/ubuntu/projects/dealengine/publish/"

          elif [ "${{ github.event.inputs.environment }}" == "rotary" ]; then
            ssh ubuntu@${{ secrets.URLINSURERotary }} "ls -lah /home/ubuntu/projects/dealengine/publish/"

          else
            ssh ubuntu@${{ secrets.URLINSUREStagingMNZConnect }} "ls -lah /home/ubuntu/projects/dealengine/publish/"
          fi

      - name: Execute Final Deployment Script
        run: |
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            ssh ubuntu@${{ secrets.URLINSUREProduction }} './DE-DeployFin.sh'

          elif [ "${{ github.event.inputs.environment }}" == "rotary" ]; then
            ssh ubuntu@${{ secrets.URLINSURERotary }} './DE-DeployFin.sh'

          else
            ssh ubuntu@${{ secrets.URLINSUREStagingMNZConnect }} './DE-DeployFin.sh'
          fi
